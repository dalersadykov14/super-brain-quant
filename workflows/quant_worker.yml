name: Super Brain Quant Engine Worker

on:
  schedule:
    # Automatically triggers at 5:00 PM EST (21:00 UTC) every weekday at market close
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Gives you a button in GitHub to run it manually whenever you want

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train ML Model (Active Learning Phase)
      env:
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python ml_trainer.py

    - name: Run Optimization Simulation
      env:
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python simulate_run.py

    - name: Commit and Push Updates Back to Repo
      run: |
        git config --global user.name "SuperBrainBot"
        git config --global user.email "bot@superbrain.quant"
        
        # Stage your freshly trained model and your updated portfolio sheets
        git add ml_model_v1.pkl live_portfolio_state.csv portfolio_builder.log ticker_training_data.csv
        
        # Only commit if data actually changed
        git diff-index --quiet HEAD || git commit -m "🤖 Automated Quant Engine Execution & ML Model Re-Train"
        git push origin main
